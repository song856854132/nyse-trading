name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: Lint / Type / Test (Py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (dev + research extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,research]"

      - name: Install uv (lockfile consistency check)
        run: pip install uv

      - name: Verify uv.lock is consistent with pyproject.toml
        run: uv lock --check

      - name: Ruff lint (fail on any finding)
        run: ruff check src tests

      - name: Ruff format (check only)
        run: ruff format --check src tests

      - name: Mypy (strict, per pyproject.toml)
        run: mypy src

      - name: Pytest
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: pytest -q --maxfail=5 --disable-warnings

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
