# Pre-commit hooks for NYSE ATS framework.
# Mirrors .github/workflows/ci.yml gates (ruff, mypy, gitleaks) and adds two
# local iron-rule guards that only make sense client-side:
#   - holdout-path-guard  -> iron rule 1 (no holdout data in commits)
#   - research-log-chain  -> iron rule 6 (hash chain must verify)
#
# Install once per clone:
#   pre-commit install
# Run on demand:
#   pre-commit run --all-files
#
# Iron rule 5: never skip a failing hook with --no-verify. Fix the root cause.

default_install_hook_types: [pre-commit]
minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (secret scan)

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (lint)
        entry: ruff check
        language: system
        types_or: [python]
        args: [src, tests]
        pass_filenames: false

      - id: ruff-format-check
        name: ruff format (check only; mirrors CI)
        entry: ruff format --check
        language: system
        types_or: [python]
        args: [src, tests]
        pass_filenames: false

      - id: mypy
        name: mypy (per pyproject.toml)
        entry: mypy
        language: system
        types_or: [python]
        args: [src]
        pass_filenames: false
        require_serial: true

      - id: holdout-path-guard
        name: holdout path guard (iron rule 1)
        entry: python3 scripts/check_holdout_guard.py
        language: system
        pass_filenames: true

      - id: research-log-chain
        name: research-log hash chain verification (iron rule 6)
        entry: python3 scripts/verify_research_log.py
        language: system
        files: ^results/research_log\.jsonl$
        pass_filenames: false
